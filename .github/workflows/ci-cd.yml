name: LINK CI/CD

# ─────────────────────────────────────────────────────────────────────────────
# Secrets GitHub requis :
#   HEROKU_API_KEY        → clé API Heroku (Account Settings > API Key)
#   HEROKU_BACKEND_APP    → nom de l'app Heroku backend  (ex: link-api-prod)
#   HEROKU_FRONTEND_APP   → nom de l'app Heroku frontend (ex: link-app-prod)
#
# Variables de config Heroku à définir via Dashboard > Settings > Config Vars :
#   Backend  : MONGO_URI, JWT_SECRET, JWT_REFRESH_SECRET, CLIENT_URL,
#              GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
#              GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET,
#              SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, EMAIL_FROM
#   Frontend : (aucune — URL backend hardcodée dans nginx.conf)
#
# Note nginx : Heroku assigne un $PORT dynamique. S'assurer que
#   docker/frontend/nginx.conf utilise `listen $PORT` via un script d'entrée.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint --workspace=apps/backend

      - name: Lint frontend
        run: npm run lint --workspace=apps/frontend

  # ── Test ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7.0
        ports: ['27017:27017']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/link_test
          JWT_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
        run: npm run test --workspace=apps/backend --if-present

  # ── Deploy Backend → Heroku Container Registry ───────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com

      - name: Build backend Docker image
        run: |
          docker build \
            -f docker/backend/Dockerfile \
            -t registry.heroku.com/${{ secrets.HEROKU_BACKEND_APP }}/web \
            .

      - name: Push backend image
        run: docker push registry.heroku.com/${{ secrets.HEROKU_BACKEND_APP }}/web

      - name: Set Heroku stack to container (backend)
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku stack:set container --app ${{ secrets.HEROKU_BACKEND_APP }}

      - name: Release backend on Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:release web --app ${{ secrets.HEROKU_BACKEND_APP }}

  # ── Deploy Frontend → Heroku Container Registry ──────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com

      - name: Build frontend Docker image
        run: |
          docker build \
            -f docker/frontend/Dockerfile \
            -t registry.heroku.com/${{ secrets.HEROKU_FRONTEND_APP }}/web \
            .

      - name: Push frontend image
        run: docker push registry.heroku.com/${{ secrets.HEROKU_FRONTEND_APP }}/web

      - name: Set Heroku stack to container (frontend)
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku stack:set container --app ${{ secrets.HEROKU_FRONTEND_APP }}

      - name: Release frontend on Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:release web --app ${{ secrets.HEROKU_FRONTEND_APP }}
